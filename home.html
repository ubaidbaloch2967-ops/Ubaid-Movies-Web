<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Home</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --neon: #f967fb; --bg: #0f101a; --card: #1e1f2b; }
        body { background: var(--bg) !important; color: white; font-family: sans-serif; }
        nav { background: #000 !important; border-bottom: 2px solid var(--neon); }
        .filter-btn { margin: 5px; border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--neon); color: white; background: transparent; }
        .filter-btn:hover, .active-filter { background: var(--neon); color: black; }
        .movie-card { padding: 8px; cursor: pointer; }
        .movie-container { background: var(--card); border-radius: 8px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .movie-info { padding: 8px; text-align: center; }
        .movie-title { font-size: 0.8rem; font-weight: bold; height: 35px; overflow: hidden; }
        .movie-year { font-size: 0.7rem; color: var(--neon); }
        .modal-content { background: #161722; border: 1px solid var(--neon); border-radius: 15px; text-align: center; }
        .ss-box { background: #000; padding: 5px; border: 1px solid #444; border-radius: 5px; margin-bottom: 15px; }
        .btn-dl { display: block; width: 100%; margin: 8px 0; padding: 10px; font-weight: bold; border-radius: 5px; text-decoration: none !important; color: white !important; }
        .b-1080 { background: #8e44ad; } .b-720 { background: #2980b9; } .b-480 { background: #c0392b; }
    </style>
</head>
<body>
    <nav class="navbar p-2 px-3 d-flex justify-content-between sticky-top">
        <span class="navbar-brand text-white font-weight-bold" style="color:var(--neon) !important">BALOCH</span>
        <form id="search-form" class="form-inline"><input id="search" class="form-control form-control-sm" type="search" placeholder="Search..."></form>
    </nav>

    <div class="container text-center mt-3">
        <button onclick="loadByYear(2026)" class="filter-btn">2026 Movies</button>
        <button onclick="loadTrending()" class="filter-btn">All Trending</button>
    </div>

    <div class="container-fluid mt-3">
        <div id="movie-content" class="row"></div>
        <div class="d-flex justify-content-center my-4">
            <button class="btn btn-sm btn-outline-light mx-2" onclick="changePage(-1)">Prev</button>
            <button class="btn btn-sm btn-outline-light mx-2" onclick="changePage(1)">Next</button>
        </div>
    </div>

    <div class="modal fade" id="dlModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">
                <h5 id="mTitle"></h5>
                <div class="ss-box"><small class="d-block text-muted">ScreenShots</small><img id="mBG" src="" class="w-100"></div>
                <p class="small">|| Direct Download Links ||</p>
                <a href="#" id="l1080" target="_blank" class="btn-dl b-1080">1080p Download</a>
                <a href="#" id="l720" target="_blank" class="btn-dl b-720">720p Download</a>
                <a href="#" id="l480" target="_blank" class="btn-dl b-480">480p Download</a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_KEY = "249f222afb1002186f4d88b2b5418b55";
        let currPage = 1;
        let currUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc`;

        async function getMovies(url) {
            const res = await fetch(url + `&page=${currPage}`);
            const data = await res.json();
            const main = document.getElementById("movie-content");
            main.innerHTML = "";
            data.results.forEach(m => {
                const year = m.release_date ? m.release_date.split('-')[0] : "N/A";
                const div = document.createElement("div");
                div.className = "col-6 col-md-3 col-lg-2 movie-card";
                div.innerHTML = `<div class="movie-container" onclick="openDL('${m.title}','${year}','${m.backdrop_path}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-100">
                    <div class="movie-info"><div class="movie-title">${m.title}</div><div class="movie-year">${year}</div></div>
                </div>`;
                main.appendChild(div);
            });
        }
        function openDL(t, y, b) {
            document.getElementById("mTitle").innerText = t + " (" + y + ")";
            document.getElementById("mBG").src = "https://image.tmdb.org/t/p/w500" + b;
            const q = encodeURIComponent(t + " " + y);
            document.getElementById("l1080").href = `https://www.google.com/search?q=site:ssrmovies.re+${q}+1080p`;
            document.getElementById("l720").href = `https://www.google.com/search?q=site:linkszilla.top+${q}+720p`;
            document.getElementById("l480").href = `https://www.google.com/search?q=${q}+480p+direct+download`;
            $('#dlModal').modal('show');
        }
        function loadByYear(y) { currPage = 1; currUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&primary_release_year=${y}&sort_by=popularity.desc`; getMovies(currUrl); }
        function loadTrending() { currPage = 1; currUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc`; getMovies(currUrl); }
        function changePage(v) { currPage += v; if(currPage < 1) currPage = 1; getMovies(currUrl); window.scrollTo(0,0); }
        
        document.getElementById("search-form").onsubmit = (e) => { e.preventDefault(); const v = document.getElementById("search").value; if(v) { currUrl = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${v}`; getMovies(currUrl); } };
        getMovies(currUrl);
    </script>
</body>
</html>
