<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Finder</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    
    <style>
        :root {
            --color1: #708ed2;
            --color2: #272532;
            --color3: #ebe5e2;
            --color4: #83cfdf;
            --color5: #13688c;
            --color6: #373b69;
        }

        body {
            background: var(--color6) !important;
            color: white;
            min-height: 100vh;
        }

        nav {
            background: #6065ac !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        nav a.navbar-brand {
            color: #ebe5e2 !important;
            font-size: 1.8rem !important;
            font-weight: bold;
        }

        .movie-card {
            padding: 15px;
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .movie-card:hover {
            transform: scale(1.05);
        }

        .movie-card img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .movie-title {
            margin-top: 10px;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
            color: var(--color3);
        }

        #search {
            border-radius: 20px;
            padding: 5px 20px;
        }

        .pagination {
            margin: 40px 0;
        }

        .page-link {
            background: var(--color2) !important;
            color: white !important;
            border: none !important;
            margin: 0 5px;
        }
    </style>
</head>
<body>

    <nav class="fixed-top d-flex justify-content-center navbar p-2">
        <a href="index.html" class="p-0 navbar-brand d-none d-lg-block">Movie Finder</a>
        <form id="search-form" class="form-inline ml-lg-4">
            <input id="search" class="form-control mr-sm-2" type="search" placeholder="Search Movie..." aria-label="Search" />
        </form>
    </nav>

    <section>
        <div class="container-fluid mt-5 p-5">
            <div id="movie-content" class="row d-flex justify-content-center">
                <p>Loading movies...</p>
            </div>
        </div>
    </section>

    <nav aria-label="Page navigation example">
        <ul class="pagination justify-content-center">
            <li class="page-item">
                <a id="previous" class="btn page-link">Previous</a>
            </li>
            <li class="page-item">
                <a id="next" class="btn page-link">Next</a>
            </li>
        </ul>
    </nav>

    <script>
        const API_KEY = "249f222afb1002186f4d88b2b5418b55";
        const IMAGE_PATH = "https://image.tmdb.org/t/p/w500";
        let page = 1;

        const API_URL = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&language=en-US&sort_by=popularity.desc&page=`;
        const API_SEARCH = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=`;

        const mainContent = document.getElementById("movie-content");
        const form = document.getElementById("search-form");
        const search = document.getElementById("search");

        // Movies fetch karne ka function
        async function getMovies(url) {
            const resp = await fetch(url);
            const respData = await resp.json();
            showMovies(respData.results);
        }

        function showMovies(movies) {
            mainContent.innerHTML = "";
            movies.forEach((movie) => {
                const { poster_path, title, vote_average } = movie;
                const movieEl = document.createElement("div");
                movieEl.classList.add("col-6", "col-md-4", "col-lg-2", "movie-card");

                movieEl.innerHTML = `
                    <img src="${poster_path ? IMAGE_PATH + poster_path : 'https://via.placeholder.com/500x750?text=No+Image'}" alt="${title}">
                    <div class="movie-title">${title}</div>
                    <div class="text-center"><span class="badge badge-warning">${vote_average}</span></div>
                `;
                mainContent.appendChild(movieEl);
            });
        }

        // Search event
        form.addEventListener("submit", (e) => {
            e.preventDefault();
            const searchTerm = search.value;
            if (searchTerm) {
                getMovies(API_SEARCH + searchTerm);
            }
        });

        // Pagination buttons
        document.getElementById("next").addEventListener("click", () => {
            page++;
            getMovies(API_URL + page);
            window.scrollTo(0, 0);
        });

        document.getElementById("previous").addEventListener("click", () => {
            if (page > 1) {
                page--;
                getMovies(API_URL + page);
                window.scrollTo(0, 0);
            }
        });

        // Pehli baar load karne ke liye
        getMovies(API_URL + page);
    </script>
</body>
</html>
