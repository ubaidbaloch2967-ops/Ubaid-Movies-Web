<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Explore</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root {
            --color-bg: #1a1b29; /* Deep dark blue */
            --color-nav: #6065ac;
            --color-card: #272532;
            --neon-pink: #f967fb;
        }

        body {
            background-color: var(--color-bg) !important;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Navbar Styling */
        nav {
            background: var(--color-nav) !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        nav a {
            color: #ebe5e2 !important;
            font-size: 1.8rem !important;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Search Input */
        #search {
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--neon-pink);
            color: white;
            padding: 10px 20px;
        }

        /* Movie Card Styling */
        .movie-card {
            margin-bottom: 30px;
            transition: transform 0.4s ease;
        }
        .movie-card:hover {
            transform: scale(1.08);
        }
        .movie-card img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .movie-info {
            background: var(--color-card);
            padding: 15px;
            border-radius: 0 0 12px 12px;
            margin-top: -10px;
            text-align: center;
        }
        .movie-info h3 {
            font-size: 1.1rem;
            margin: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .rating {
            background: var(--neon-pink);
            color: black;
            padding: 2px 8px;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Pagination Buttons */
        .page-link {
            background: var(--color-nav) !important;
            color: white !important;
            border: none !important;
            margin: 0 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <nav class="fixed-top d-flex justify-content-between align-items-center navbar p-2">
      <a href="index.html" class="navbar-brand">Movie Finder</a>
      <form id="search-form" class="form-inline">
        <input id="search" class="form-control" type="search" placeholder="Search Movie..." aria-label="Search" />
      </form>
    </nav>

    <div class="container-fluid mt-5 pt-5">
        <div id="movie-content" class="row d-flex justify-content-center">
          </div>
    </div>

    <nav aria-label="Page navigation">
      <ul class="pagination justify-content-center pb-5">
        <li class="page-item"><a id="previous" class="btn page-link">Previous</a></li>
        <li class="page-item"><a id="next" class="btn page-link">Next</a></li>
      </ul>
    </nav>

    <script>
        const API_KEY = "249f222afb1002186f4d88b2b5418b55";
        const IMAGE_PATH = "https://image.tmdb.org/t/p/w500";
        const API_URL = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&page=`;
        const API_SEARCH = `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=`;

        let currentPage = 1;
        const mainContent = document.getElementById("movie-content");
        const form = document.getElementById("search-form");
        const searchInput = document.getElementById("search");

        // Fetch movies on load
        loadMovies(API_URL + currentPage);

        async function loadMovies(url) {
            const res = await fetch(url);
            const data = await res.json();
            displayMovies(data.results);
        }

        function displayMovies(movies) {
            mainContent.innerHTML = "";
            movies.forEach((movie) => {
                const { poster_path, title, vote_average } = movie;
                const movieDiv = document.createElement("div");
                movieDiv.classList.add("col-6", "col-md-4", "col-lg-2", "movie-card");
