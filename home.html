<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Moviz | Direct SSR Downloads</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --ssr-blue: #0084b4; --ssr-bg: #f1f2f6; }
        body { background: var(--ssr-bg) !important; color: #333; font-family: 'Helvetica', Arial, sans-serif; }
        
        /* Navbar */
        nav { background: var(--ssr-blue) !important; border-bottom: 3px solid #005e81; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .navbar-brand { font-weight: bold; color: white !important; font-size: 1.5rem; }

        /* Movie Grid */
        .movie-card { padding: 8px; }
        .movie-container { background: #fff; border: 1px solid #ddd; padding: 4px; transition: 0.2s; cursor: pointer; }
        .movie-container:hover { border-color: var(--ssr-blue); box-shadow: 0 0 8px rgba(0,132,180,0.3); }
        .movie-container img { width: 100%; height: auto; border-radius: 2px; }
        .movie-title { font-size: 0.8rem; font-weight: 700; color: #007399; margin-top: 8px; line-height: 1.3; height: 42px; overflow: hidden; }
        
        /* Detail Modal (SSR Style) */
        .modal-content { border-radius: 0; border: 4px solid var(--ssr-blue); }
        .modal-header { background: #f9f9f9; border-bottom: 1px solid #ddd; }
        .movie-info-box { text-align: left; font-size: 0.9rem; line-height: 1.8; color: #444; }
        .movie-info-box b { color: #000; }
        
        /* Screenshots Grid */
        .ss-label { background: #f1f1f1; border: 1px dashed #bbb; padding: 5px; font-weight: bold; margin: 20px 0 10px; }
        .ss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .ss-grid img { width: 100%; border: 2px solid #fff; box-shadow: 0 0 5px rgba(0,0,0,0.1); }

        /* Exact Buttons from Screenshot */
        .btn-fast { display: block; width: 100%; padding: 12px; margin: 10px 0; font-weight: bold; color: white !important; text-decoration: none !important; text-align: center; border-radius: 4px; font-size: 0.95rem; border-bottom: 3px solid rgba(0,0,0,0.2); }
        .btn-4k { background: #ff1493; }   /* Pink */
        .btn-1080 { background: #a020f0; } /* Purple */
        .btn-720 { background: #1e90ff; }  /* Blue */
        .btn-480 { background: #ff0000; }  /* Red */

        /* Android Promo */
        .android-box { background: #000; color: white; padding: 15px; border-radius: 8px; margin-top: 25px; cursor: pointer; }
        .android-box img { width: 40px; margin-right: 10px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand">BALOCH MOVIZ</a>
            <form id="search-form" class="form-inline">
                <input id="search-input" class="form-control form-control-sm" type="search" placeholder="Search movies...">
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <h4 class="text-secondary border-bottom pb-2">Latest 2026 Releases</h4>
        <div id="movie-grid" class="row no-gutters">
            </div>

        <div class="d-flex justify-content-center my-5">
            <button class="btn btn-info btn-sm mx-2 px-4" onclick="changePage(-1)">PREVIOUS</button>
            <button class="btn btn-info btn-sm mx-2 px-4" onclick="changePage(1)">NEXT PAGE</button>
        </div>
    </div>

    <div class="modal fade" id="ssrModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content p-3">
                <div class="text-center">
