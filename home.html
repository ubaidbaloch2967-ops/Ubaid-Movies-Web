<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Moviz | SSR Style</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --neon: #00d2ff; --bg: #0f101a; --card: #ffffff; }
        body { background: #f1f2f6 !important; color: #333; font-family: 'Arial', sans-serif; }
        
        /* Navbar */
        nav { background: #0084b4 !important; border-bottom: 3px solid #005f82; }
        .navbar-brand { font-weight: bold; color: white !important; letter-spacing: 1px; }

        /* Movie Grid SSR Style */
        .movie-card { padding: 5px; }
        .movie-container { background: var(--card); border: 1px solid #ddd; padding: 5px; transition: 0.3s; text-align: center; }
        .movie-container img { width: 100%; height: auto; border-radius: 2px; }
        .movie-title { font-size: 0.85rem; font-weight: bold; color: #0084b4; margin-top: 8px; line-height: 1.2; height: 35px; overflow: hidden; }
        
        /* Modal Style - High Detail */
        .modal-content { background: #fff; border-radius: 0; border: 5px solid #0084b4; }
        .detail-header { border-bottom: 2px solid #eee; margin-bottom: 15px; padding-bottom: 10px; }
        .info-text { font-size: 0.9rem; color: #444; line-height: 1.5; text-align: left; }
        .info-text b { color: #000; }
        
        /* Screenshots Section */
        .ss-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #eee; padding: 5px; border: 1px dashed #999; }
        .ss-grid img { width: 100%; border: 1px solid #fff; }

        /* SSR Styled Buttons - EXACT COLORS */
        .btn-ssr { display: block; width: 100%; padding: 12px; margin: 8px 0; font-weight: bold; color: white !important; text-decoration: none !important; text-align: center; border-radius: 4px; font-size: 0.9rem; }
        .b-4k { background: #ff1493; }    /* Pink */
        .b-1080 { background: #a020f0; }  /* Purple */
        .b-720 { background: #1e90ff; }   /* Blue */
        .b-480 { background: #ff0000; }   /* Red */

        .android-btn { background: #000; color: white; padding: 15px; border-radius: 10px; margin-top: 20px; display: inline-block; width: 100%; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <a class="navbar-brand">BALOCH MOVIZ</a>
        <form id="search-form" class="form-inline ml-auto">
            <input id="search-input" class="form-control form-control-sm" type="search" placeholder="Search Movie...">
        </form>
    </nav>

    <div class="container-fluid mt-3">
        <div id="movie-grid" class="row no-gutters">
            </div>
        
        <div class="d-flex justify-content-center my-4">
            <button class="btn btn-primary btn-sm mx-1" onclick="changePage(-1)">« Prev</button>
            <button class="btn btn-primary btn-sm mx-1" onclick="changePage(1)">Next »</button>
        </div>
    </div>

    <div class="modal fade" id="dlModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content p-3">
                <div class="detail-header text-center">
                    <h5 id="m-title-full" style="color:#0084b4; font-weight:bold;"></h5>
                </div>

                <div class="row">
                    <div class="col-md-12 info-text">
                        <p><b>IMDb:</b> <span id="m-rating"></span>/10</p>
                        <p><b>Genres:</b> <span id="m-genre"></span></p>
                        <p><b>Stars:</b> <span id="m-cast"></span></p>
                        <p><b>Story:</b> <span id="m-story"></span></p>
                    </div>
                </div>

                <h6 class="text-center font-weight-bold my-3">--- ScreenShots ---</h6>
                <div id="m-screenshots" class="ss-grid">
                    </div>

                <div class="text-center mt-4">
                    <h5 style="font-size:1.1rem; font-weight:bold;">Get This Full Movie via Fast Single Links</h5>
                    <hr>
                    <a href="#" id="l-4k" class="btn-ssr b-4k">Download in 4K (x264) Ultra HD - 5.5GB</a>
                    <a href="#" id="l-1080" class="btn-ssr b-1080">Watch & Download in 1080p - 2.2GB</a>
                    <a href="#" id="l-720" class="btn-ssr b-720">Watch & Download in 720p - 1GB</a>
                    <a href="#" id="l-480" class="btn-ssr b-480">Watch & Download in 480p - 376MB</a>
                </div>

                <div class="android-btn text-center">
                    <img src="https://img.icons8.com/color/48/000000/android-os.png" style="width:30px"> 
                    <b>Download our Android App</b>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_KEY = "249f222afb1002186f4d88b2b5418b55";
        let page = 1;
        let activeUrl = `https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&primary_release_year=2026&sort_by=popularity.desc`;

        async function getMovies(url) {
            const res = await fetch(url + `&page=${page}`);
            const data = await res.json();
            const grid = document.getElementById("movie-grid");
            grid.innerHTML = "";

            data.results.forEach(m => {
                const year = m.release_date ? m.release_date.split('-')[0] : "2026";
                const card = document.createElement("div");
                card.className = "col-6 col-md-3 col-lg-2 movie-card";
                card.innerHTML = `
                    <div class="movie-container" onclick="showSSRDetail('${m.id}')">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                        <div class="movie-title">${m.title} ${year} Dual Audio Hindi (ORG)</div>
                    </div>`;
                grid.appendChild(card);
            });
        }
