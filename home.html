<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Direct Download</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon-pink: #f967fb; --bg-dark: #0f101a; --card-bg: #1e1f2b; }
        body { background: var(--bg-dark) !important; color: white; font-family: 'Montserrat', sans-serif; }
        nav { background: #000 !important; border-bottom: 2px solid var(--neon-pink); }
        .navbar-brand { color: var(--neon-pink) !important; font-weight: bold; font-size: 1.5rem; }

        .movie-card { padding: 10px; margin-bottom: 20px; cursor: pointer; }
        .movie-container { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid #333; transition: 0.3s; }
        .movie-container:hover { border-color: var(--neon-pink); transform: scale(1.03); }
        
        .movie-info { padding: 10px; text-align: center; }
        .movie-title { font-size: 0.85rem; font-weight: bold; margin-bottom: 2px; }
        .movie-year { font-size: 0.75rem; color: var(--neon-pink); }

        /* Modal Styling */
        .modal-content { background: #161722; border: 1px solid var(--neon-pink); border-radius: 15px; }
        .screenshot-box { background: #000; padding: 5px; border: 1px solid #444; border-radius: 5px; margin-bottom: 15px; }
        .screenshot-label { background: #333; color: #fff; font-size: 12px; padding: 2px 10px; display: inline-block; margin-bottom: 5px; }
        
        .dl-btn { display: block; width: 100%; margin: 8px 0; padding: 12px; font-weight: bold; border-radius: 5px; text-transform: uppercase; text-decoration: none !important; color: white !important; }
        .btn-1080p { background: #8e44ad; } 
        .btn-720p { background: #2980b9; }  
        .btn-480p { background: #c0392b; }  
        .dl-btn:hover { opacity: 0.8; box-shadow: 0 0 10px rgba(255,255,255,0.2); }

        #search { border-radius: 20px; border: 1px solid var(--neon-pink); background: #222; color: #fff; }
    </style>
</head>
<body>

    <nav class="fixed-top navbar p-2 px-4 d-flex justify-content-between">
        <a href="index.html" class="navbar-brand">BALOCH MOVIES</a>
        <form id="search-form" class="form-inline">
            <input id="search" class="form-control" type="search" placeholder="Search..." aria-label="Search">
        </form>
    </nav>

    <div class="container-fluid mt-5 pt-5">
        <div id="movie-content" class="row d-flex justify-content-center"></div>
    </div>

    <div class="modal fade" id="downloadModal" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-md modal-dialog-centered" role="document">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title w-100 text-center" id="modalTitle">Movie Name</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body text-center">
                    <div class="screenshot-box">
                        <span class="screenshot-label">ScreenShots</span>
                        <img id="movieBackdrop" src="" class="w-100" style="border-radius: 5px; filter: brightness(0.8);">
                    </div>

                    <div style="border-top: 1px dashed #555; padding-top: 15px;">
                        <p class="small text-muted mb-3">|| Direct Download Links ||</p>
                        <a href="#" id="dl1080" target="_blank" class="dl-btn btn-1080p">Download 1080p (Direct)</a>
                        <a href="#" id="dl720" target="_blank" class="dl-btn btn-720p">Download 720p (Fast)</a>
                        <a href="#" id="dl480" target="_blank" class="dl-btn btn-480p">Download 480p (Small)</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_KEY = "249f222afb1002186f4d88b2b5418b55";
        const IMG_URL = "https://image.tmdb.org/t/p/w500";
        const main = document.getElementById("movie-content");

        async function fetchMovies(url) {
            const res = await fetch(url);
            const data = await res.json();
            data.results.forEach(movie => {
                const { title, poster_path, release_date, backdrop_path } = movie;
                const year = release_date ? release_date.split('-')[0] : "N/A";
                const card = document.createElement("div");
                card.classList.add("col-6", "col-md-3", "col-lg-2", "movie-card");
                card.innerHTML = `
                    <div class="movie-container" onclick="showDL('${title}', '${year}', '${backdrop_path}')">
                        <img src="${IMG_URL + poster_path}" class="w-100">
                        <div class="movie-info">
                            <div class="movie-title">${title}</div>
                            <div class="movie-year">${year}</div>
                        </div>
                    </div>`;
                main.appendChild(card);
            });
        }

        function showDL(name, year, bg) {
            document.getElementById("modalTitle").innerText = name;
            document.getElementById("movieBackdrop").src = IMG_URL + bg;
            
            // Direct Download Links Logic
            // Ye links user ko direct SSRMovies ya similar sites ke result page par le jayenge
            const searchTag = encodeURIComponent(name + " " + year + " direct download");
            document.getElementById("dl1080").href = `https://www.google.com/search?q=site:ssrmovies.re+${searchTag}+1080p`;
            document.getElementById("dl720").href = `https://www.google.com/search?q=site:linkszilla.top+${searchTag}+720p`;
            document.getElementById("dl480").href = `https://www.google.com/search?q=${searchTag}+480p+direct+link`;
            
            $('#downloadModal').modal('show');
        }

        fetchMovies(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&sort_by=popularity.desc&page=1`);
    </script>
</body>
</html>
