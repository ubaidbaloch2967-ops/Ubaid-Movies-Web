<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Moviz | Download Latest Movies</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --neon: #f967fb; --bg: #0f101a; --card: #1e1f2b; }
        body { background: var(--bg) !important; color: white; font-family: 'Segoe UI', sans-serif; }
        
        /* Navbar Branding */
        nav { background: #000 !important; border-bottom: 2px solid var(--neon); box-shadow: 0 0 10px var(--neon); }
        .navbar-brand { font-weight: bold; color: var(--neon) !important; letter-spacing: 2px; text-transform: uppercase; }
        
        /* Filter Buttons */
        .filter-nav { background: #161722; padding: 12px; white-space: nowrap; overflow-x: auto; border-bottom: 1px solid #333; }
        .btn-filter { color: white; border: 1.5px solid var(--neon); border-radius: 20px; padding: 5px 18px; margin: 0 5px; font-size: 0.85rem; background: transparent; transition: 0.3s; }
        .btn-filter:hover, .btn-filter.active { background: var(--neon); color: black; box-shadow: 0 0 10px var(--neon); }

        /* Movie Card & Download Button */
        .movie-card { padding: 10px; transition: 0.3s; }
        .movie-container { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; height: 100%; position: relative; }
        .movie-info { padding: 8px; text-align: center; }
        .movie-title { font-size: 0.8rem; font-weight: bold; height: 38px; overflow: hidden; margin-bottom: 4px; }
        .btn-card-dl { background: var(--neon); color: black; border: none; width: 100%; font-size: 0.75rem; font-weight: bold; padding: 5px; border-radius: 0 0 10px 10px; cursor: pointer; }

        /* Modal */
        .modal-content { background: #161722; border: 2px solid var(--neon); border-radius: 20px; box-shadow: 0 0 20px var(--neon); }
        .dl-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; border-radius: 8px; font-weight: bold; text-decoration: none !important; color: white !important; text-transform: uppercase; }
        .btn-1080 { background: #8e44ad; } .btn-720 { background: #2980b9; } .btn-480 { background: #c0392b; }
        .ss-box { background: #000; padding: 8px; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand">BALOCH MOVIZ</a>
            <form id="search-form" class="form-inline">
                <input id="search-input" class="form-control form-control-sm bg-dark text-white border-secondary" type="search" placeholder="Search Movie...">
            </form>
        </div>
    </nav>

    <div class="filter-nav text-center">
        <button onclick="loadByYear(2026)" class="btn-filter">2026 Movies</button>
        <button onclick="loadTrending()" class="btn-filter">Trending</button>
        <button onclick="loadByYear(2025)" class="btn-filter">2025 Movies</button>
    </div>

    <div class="container-fluid mt-4">
        <div id="movie-grid" class="row">
            </div>

        <div class="d-flex justify-content-center my-5">
            <button class="btn btn-outline-info mx-2" onclick="changePage(-1)">PREV</button>
            <button class="btn btn-outline-info mx-2" onclick="changePage(1)">NEXT</button>
        </div>
    </div>

    <div class="modal fade" id="downloadModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-4 text-center">
                <h5 id="m-title" class="mb-3 font-weight-bold"></h5>
                <div class="ss-box mb-3">
