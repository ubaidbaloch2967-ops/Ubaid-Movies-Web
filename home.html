<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Home</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        :root { --neon: #f967fb; --bg: #0f101a; --card: #1e1f2b; }
        body { background: var(--bg) !important; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Navbar & Branding */
        nav { background: #000 !important; border-bottom: 2px solid var(--neon); box-shadow: 0 0 10px var(--neon); }
        .navbar-brand { font-weight: bold; color: var(--neon) !important; letter-spacing: 2px; }
        
        /* Filter Buttons */
        .filter-nav { background: #161722; padding: 12px; white-space: nowrap; overflow-x: auto; border-bottom: 1px solid #333; }
        .btn-filter { color: white; border: 1.5px solid var(--neon); border-radius: 20px; padding: 5px 18px; margin: 0 5px; font-size: 0.85rem; background: transparent; transition: 0.3s; }
        .btn-filter:hover, .btn-filter.active { background: var(--neon); color: black; box-shadow: 0 0 10px var(--neon); }

        /* Movie Cards */
        .movie-card { padding: 10px; transition: transform 0.3s; }
        .movie-card:hover { transform: scale(1.05); }
        .movie-container { background: var(--card); border-radius: 12px; border: 1px solid #333; overflow: hidden; height: 100%; }
        .movie-info { padding: 10px; text-align: center; }
        .movie-title { font-size: 0.9rem; font-weight: bold; height: 40px; overflow: hidden; line-height: 1.2; margin-bottom: 5px; }
        .movie-year { font-size: 0.75rem; color: var(--neon); font-weight: bold; }

        /* Download Modal & Buttons */
        .modal-content { background: #161722; border: 2px solid var(--neon); border-radius: 20px; box-shadow: 0 0 20px var(--neon); }
        .ss-header { background: #333; font-size: 12px; padding: 4px 12px; border-radius: 4px; display: inline-block; margin-bottom: 8px; color: #aaa; }
        .dl-btn { display: block; width: 100%; margin: 10px 0; padding: 14px; border-radius: 8px; font-weight: bold; text-decoration: none !important; color: white !important; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .btn-1080 { background: #8e44ad; } .btn-1080:hover { background: #9b59b6; }
        .btn-720 { background: #2980b9; } .btn-720:hover { background: #3498db; }
        .btn-480 { background: #c0392b; } .btn-480:hover { background: #e74c3c; }
        
        .bg-black-box { background: #000; padding: 8px; border-radius: 10px; border: 1px solid #444; }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand">BALOCH</a>
            <form id="search-form" class="form-inline">
                <input id="search-input" class="form-control form-control-sm bg-dark text-white border-secondary" type="search" placeholder="Search Movie...">
            </form>
        </div>
    </nav>

    <div class="filter-nav text-center">
        <button onclick="loadByYear(2026)" class="btn-filter">2026 Movies</button>
        <button onclick="loadTrending()" class="btn-filter">All Trending</button>
        <button onclick="loadByYear(2025)" class="btn-filter">2025 Movies</button>
    </div>

    <div class="container-fluid mt-4">
        <div id="movie-grid" class="row">
            </div>
