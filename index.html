<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Ubaid Movies Web</title>
    <style>
        /* 5 Second Loader Styling */
        #loader-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00f2ff; font-family: sans-serif;
        }
        .timer-box { font-size: 4rem; border: 2px solid #ff00ea; padding: 10px 40px; border-radius: 15px; box-shadow: 0 0 20px #ff00ea; }

        /* Aapki Original Coding ka Design */
        body { margin: 0; background: #000; overflow: hidden; }
        #app { display: none; height: 100vh; width: 100vw; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .hero { 
            position: absolute; z-index: 10; width: 100%; top: 5%; 
            text-align: center; color: white; font-family: sans-serif; 
        }
        .hero h1 { font-size: 3rem; text-transform: uppercase; margin: 0; }

        /* 3D Scene Styling */
        .scene {
            height: 100vh; display: grid; place-content: center;
            perspective: 1000px; position: relative; z-index: 5;
        }
        .a3d {
            --n: 12; transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        .card {
            position: absolute; width: 180px; height: 250px;
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.3);
            object-fit: cover;
            --angle: calc(var(--i) * (360deg / var(--n)));
            transform: rotateY(var(--angle)) translateZ(350px);
        }
    </style>
</head>
