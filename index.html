<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body, html, #app {
            margin: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        body {
            touch-action: none;
        }

        #app {
            font-family: "Montserrat", sans-serif;
        }

        .hero {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            color: white;
            text-transform: uppercase;
            font-weight: 900;
            margin: 0;
            letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        h3 {
            color: #888;
            font-weight: 400;
            letter-spacing: 8px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Link/Button Styling */
        .hero a {
            pointer-events: auto; /* Isse click kaam karega */
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 14px;
            margin-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            background: rgba(0,0,0,0.3);
        }

        .hero a:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>
  <div class="hero">
    <h1>Baloch</h1>
    <h3>Movies</h3>
    <a href="home.html">Baloch Movies Downloading Website</a>
  </div>
</div>

<script type="module">
    // Tubes Cursor Effect JS
    import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js"

    const app = TubesCursor(document.getElementById('canvas'), {
        tubes: {
            colors: ["#f967fb", "#53bc28", "#6958d5"],
            lights: {
                intensity: 200,
                colors: ["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"]
            }
        }
    })

    // Screen click par colors badalna
    document.body.addEventListener('click', () => {
        const colors = randomColors(3)
        const lightsColors = randomColors(4)
        app.tubes.setColors(colors)
        app.tubes.setLightsColors(lightsColors)
    })

    function randomColors (count) {
        return new Array(count)
            .fill(0)
            .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'))
    }

    // AUTO REDIRECT (5 Seconds baad khud agla page khul jayega)
    setTimeout(() => {
        window.location.href = "home.html";
    }, 5000);
</script>

</body>
</html>
