<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Moviz | Welcome</title>
    <style>
        /* Original Animation Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* Neon Lines Animation Effect */
        .neon-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 150px;
            background: transparent;
            z-index: -1;
        }

        .neon-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 20px #f967fb, 0 0 40px #f967fb, 0 0 60px #f967fb;
            filter: blur(20px);
            opacity: 0.6;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 0.9; }
        }

        /* Branding Text */
        h1 {
            font-size: 4rem;
            color: white;
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
            animation: fadeIn 2s ease-in forwards;
        }

        p {
            color: #888;
            font-size: 1.2rem;
            letter-spacing: 5px;
            margin-top: -10px;
            text-transform: lowercase;
            opacity: 0;
            animation: fadeIn 2s ease-in 1s forwards;
        }

        /* Professional Button */
        .enter-btn {
            margin-top: 50px;
            padding: 12px 40px;
            background: transparent;
            color: white;
            border: 1px solid #444;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 2px;
            display: inline-block;
            transition: 0.5s;
            opacity: 0;
            animation: fadeIn 2s ease-in 2s forwards;
        }

        .enter-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="neon-bg">
            <div class="neon-lines"></div>
        </div>

        <h1>BALOCH</h1>
        <p>movies</p>

        <a href="home.html" class="enter-btn">BALOCH MOVIES DOWNLOADING WEBSITE</a>
    </div>

</body>
</html>
