<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Intro</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- AAPKI CSS --- */
        body, html, #app {
            margin: 0;
            width: 100%;
            height: 100%;
            background-color: #000; /* Background black rakha hai taaki neon lines dikhen */
            overflow: hidden;
        }

        body {
            touch-action: none;
        }

        #app {
            font-family: "Montserrat", sans-serif;
        }

        #app a {
            text-decoration: none;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            transition: 0.3s;
            margin-top: 20px;
        }

        #app a:hover {
            background: #fff;
            color: #000;
        }

        .hero {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10; /* Text ko canvas ke upar lane ke liye */
            pointer-events: none; /* Mouse effect ko piche jane daita hai */
        }

        /* Pointer events enable for link */
        .hero a { pointer-events: auto; }

        h1 {
            font-size: 80px;
            color: white;
            text-transform: uppercase;
            font-weight: 900;
            margin: 0;
            letter-spacing: 10px;
        }

        h3 {
            color: #888;
            font-weight: 400;
            letter-spacing: 5px;
            margin: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>
  <div class="hero">
    <h1>Baloch</h1>
    <h3>Movies</h3>
    <a href="https://www.balochmovies.com">Baloch Movies Downloading Website</a>
  </div>
</div>

<script type="module">
    // --- AAPKI JS (Tubes Cursor Effect) ---
    import TubesCursor from "https://cdn.jsdelivr.net/npm/threejs-components@0.0.19/build/cursors/tubes1.min.js"

    const app = TubesCursor(document.getElementById('canvas'), {
        tubes: {
            colors: ["#f967fb", "#53bc28", "#6958d5"],
            lights: {
                intensity: 200,
                colors: ["#83f36e", "#fe8a2e", "#ff008a", "#60aed5"]
            }
        }
    })

    // Click par colors change karne wala function
    document.body.addEventListener('click', () => {
        const colors = randomColors(3)
        const lightsColors = randomColors(4)
        app.tubes.setColors(colors)
        app.tubes.setLightsColors(lightsColors)
    })

    function randomColors (count) {
        return new Array(count)
            .fill(0)
            .map(() => "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'))
    }

    // --- AUTOMATIC REDIRECT ---
    // 5 seconds baad home page par le jane ke liye
    setTimeout(() => {
        // Yahan apni main website ka link likhein
        // window.location.href = "home.html"; 
    }, 5000);
</script>

</body>
</html>
