<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movie's | Loading...</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; height: 100%; font-family: 'Arial', sans-serif; }
        
        #app {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero {
            position: relative;
            z-index: 2;
            text-align: center;
            color: white;
        }

        .hero h1 {
            font-size: 5rem;
            margin: 0;
            letter-spacing: 10px;
            color: #e50914; /* Baloch Red Theme */
            text-shadow: 0 0 20px rgba(229, 9, 20, 0.5);
        }

        .hero h3 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        .hero a {
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
            border: 1px solid #444;
            padding: 5px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .hero a:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

<div id="app">
  <canvas id="canvas"></canvas>
  <div class="hero">
    <h1>BALOCH</h1>
    <h3>Movie's</h3>
    <a target="_blank" href="https://www.framer.com/@kevin-levron/">Movies Downloading Website</a>
  </div>
</div>

<script>
    // 4 seconds ka wait aur phir Redirect
    setTimeout(function() {
        // Maan lijiye aapki main movies file ka naam 'home.html' hai
        window.location.href = "home.html"; 
    }, 4000);

    // Canvas animation (Simple particle effect)
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    for(let i=0; i<100; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 2,
            d: Math.random() * 100
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.beginPath();
        for(let i=0; i<100; i++) {
            let p = particles[i];
            ctx.moveTo(p.x, p.y);
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2, true);
        }
        ctx.fill();
        update();
    }

    function update() {
        for(let i=0; i<100; i++) {
            let p = particles[i];
            p.y += Math.cos(p.d) + 1;
            if(p.y > canvas.height) {
                particles[i] = {x: Math.random()*canvas.width, y: -10, r: p.r, d: p.d};
            }
        }
    }
    setInterval(draw, 33);
</script>

</body>
</html>
