<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubaid Movies Web | 3D Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS for your Scene & 3D Cards */
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        #loader-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* Aapki Coding ka Structure */
        #app { display: none; height: 100vh; position: relative; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .hero { position: absolute; width: 100%; top: 5%; text-align: center; z-index: 10; }
        .hero h1 { font-size: 3rem; color: #ff00ea; text-shadow: 0 0 20px #ff00ea; }

        .scene {
            height: 100vh; display: grid; place-content: center;
            perspective: 1000px; position: relative; z-index: 5;
        }
        .a3d {
            --n: 12; transform-style: preserve-3d;
            display: flex; align-items: center; justify-content: center;
            animation: rotateScene 25s linear infinite;
        }
        @keyframes rotateScene {
            0% { transform: rotateY(0deg) rotateX(-5deg); }
            100% { transform: rotateY(360deg) rotateX(-5deg); }
        }
        .card-container {
            position: absolute; 
            --angle: calc(var(--i) * (360deg / var(--n)));
            transform: rotateY(var(--angle)) translateZ(350px);
            text-align: center;
        }
        .card {
            width: 160px; height: 230px; border-radius: 10px;
            border: 2px solid #00f2ff; object-fit: cover;
            box-shadow: 0 0 15px rgba(0,242,255,0.5);
        }
        .download-btn {
            background: #ff00ea; color: white; font-size: 10px;
            padding: 5px 10px; border-radius: 5px; display: inline-block;
            margin-top: 5px; text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="loader-screen">
        <h2 style="color: #00f2ff; letter-spacing: 5px;">UBAID MOVIES WEB</h2>
        <div id="countdown" style="font-size: 5rem; margin: 20px 0;">10</div>
        <p>Loading 3D Database...</p>
    </div>

    <div id="app">
        <canvas id="canvas"></canvas>

        <div class="hero">
            <h1>Ubaidullah Baloch</h1>
            <p style="color: #00f2ff;">Premium 3D Movie Downloader</p>
        </div>

        <div class="scene">
            <div class="a3d" style="--n: 12">
                <div class="card-container" style="--i: 0">
                    <img class="card" src="https://image.tmdb.org/t/p/w500/966mS4vQ96HGp9U6fUo1o6fHG9u.jpg" alt="Pushpa 2">
                    <a href="https://www.google.com" class="download-btn">DOWNLOAD</a>
                </div>
                <div class="card-container" style="--i: 1">
                    <img class="card" src="https://image.tmdb.org/t/p/w500/kSno67pSAtS9pS9pS9pS9pS9pS9.jpg" alt="Avatar 3">
                    <a href="#" class="download-btn">DOWNLOAD</a>
                </div>
                <div class="card-container" style="--i: 2">
                    <img class="card" src="https://image.tmdb.org/t/p/w500/zW6SlvzW6SlvzW6SlvzW6Slv.jpg" alt="Avengers">
                    <a href="#" class="download-btn">DOWNLOAD</a>
                </div>
                <div class="card-container" style="--i: 3">
                    <img class="card" src="https://image.tmdb.org/t/p/w500/8Gxv8Gxv8Gxv8Gxv8Gxv8Gxv.jpg" alt="War 2">
                    <a href="#" class="download-btn">DOWNLOAD</a>
                </div>
                <div class="card-container" style="--i: 4">
                    <img class="card" src="https://image.tmdb.org/t/p/w500/7W6Slv7W6Slv7W6Slv7W6Slv.jpg" alt="Mission Impossible">
                    <a href="#" class="download-btn">DOWNLOAD</a>
                </div>
                <div class="card-container" style="--i: 5"><img class="card" src="https://image.tmdb.org/t/p/w500/1W6Slv1W6Slv1W6Slv1W6Slv.jpg"><a href="#" class="download-btn">DOWNLOAD</a></div>
                <div class="card-container" style="--i: 6"><img class="card" src="https://image.tmdb.org/t/p/w500/2W6Slv2W6Slv2W6Slv2W6Slv.jpg"><a href="#" class="download-btn">DOWNLOAD</a></div>
                <div class="card-container" style="--i: 7"><img class="card" src="https://image.tmdb.org/t/p/w500/3W6Slv3W6Slv3W6Slv3W6Slv.jpg"><a href="#" class="download-btn">DOWNLOAD</a></div>
                <div class="card-container" style="--i: 8"><img class="card" src="https://image.tmdb.org/t/p/w500/4W6Slv4W6Slv4W6Slv4W6Slv.jpg"><a href="#" class="download-btn">DOWNLOAD</a></div>
                <div class="card-container" style="--i: 9"><img class="card" src="https://image.tmdb.org/t/p/w500/5W6Slv5W6Slv5W6Slv5W6Slv.jpg"><a href="#" class="download-btn">DOWNLOAD</a></div>
                <div class="card-container" style="--i: 10"><img class="card" src="https://image.tmdb.org/t/p/w500/0W6Slv0W6Slv0W6Slv0W6Slv.jpg"><a href="#" class="download-btn">DOWNLOAD</a></div>
                <div class="card-container" style="--i: 11"><img class="card" src="https://image.tmdb.org/t/p/w500/6W6Slv6W6Slv6W6Slv6W6Slv.jpg"><a href="#" class="download-btn">DOWNLOAD</a></div>
            </div>
        </div>
    </div>

    <script>
        // Timer
        let count = 10;
        const timer = setInterval(() => {
            count--;
            document.getElementById('countdown').innerText = count;
            if(count <= 0) {
                clearInterval(timer);
                document.getElementById('loader-screen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                initTubes(); // Start your canvas tubes
            }
        }, 1000);

        // Aapki Tubes Animation ka Basic Logic (Placeholder)
        function initTubes() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            // Yahan aapki Tubes wali asli JS code aayegi
            console.log("Tubes animation started on background!");
        }
    </script>
</body>
</html>
