<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubaid Movies Web</title>
    <style>
        /* Sirf Loader ki basic styling */
        #loader-screen {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #00f2ff; font-family: sans-serif;
        }
        .timer-box { font-size: 4rem; border: 2px solid #ff00ea; padding: 10px 40px; border-radius: 15px; box-shadow: 0 0 20px #ff00ea; }

        /* Aapka Original App Design */
        #app { display: none; height: 100vh; overflow: hidden; background: #000; }
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .hero { 
            position: relative; z-index: 10; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100vh; color: white;
            font-family: sans-serif; text-align: center;
        }
        .hero h1 { font-size: 4rem; margin: 0; text-transform: uppercase; letter-spacing: 5px; }
        .hero h2 { font-size: 1.5rem; color: #00f2ff; margin: 10px 0; }
        .hero a { color: #ff00ea; text-decoration: none; border: 1px solid #ff00ea; padding: 10px 20px; margin-top: 20px; border-radius: 5px; }
    </style>
</head>
<body>

  <div id="loader-screen">
    <h2 style="margin-bottom: 20px; letter-spacing: 3px;">UBAIDULLAH SYSTEMS</h2>
    <div class="timer-box" id="countdown">5</div>
  </div>

  <div id="app">
    <canvas id="canvas"></canvas>

    <div class="hero">
      <h1>Ubaid Movies Web</h1> <h2>3D Experience</h2>
      <a target="_blank" href="https://www.framer.com/@kevin-levron/">Framer Component</a>
    </div>
  </div>

  <script>
    // Timer Logic: 5 Seconds
    let timeLeft = 5;
    const timerElement = document.getElementById("countdown");
    
    const countdown = setInterval(() => {
        timeLeft--;
        timerElement.innerText = timeLeft;
        
        if (timeLeft <= 0) {
            clearInterval(countdown);
            document.getElementById("loader-screen").style.display = "none";
            document.getElementById("app").style.display = "block";
            initTubesAnimation(); // Aapka Tubes effect yahan se shuru hoga
        }
    }, 1000);

    // Tubes Animation Logic (Jo aapne provide kiya)

        const ctx = canvas.getContext('2d');

    }
  </script>

</body>
</html>
