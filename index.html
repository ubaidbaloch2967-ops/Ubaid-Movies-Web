<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch Movies | Intro</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Montserrat', sans-serif; }
        canvas { display: block; }

        /* Hero Text Container */
        .hero {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            pointer-events: none; /* Mouse animation ko disturb nahi karega */
        }

        .hero h1 {
            color: white;
            font-size: 4rem;
            margin: 0;
            letter-spacing: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .hero h3 {
            color: #888;
            font-size: 1.2rem;
            margin: 5px 0 20px 0;
            letter-spacing: 5px;
        }

        /* Responsive & Small Button */
        .btn-download {
            display: inline-block;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            color: white;
            text-decoration: none;
            font-size: 0.85rem; /* Font size chota kiya taaky aik line mein aaye */
            letter-spacing: 1px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
            pointer-events: auto; /* Clickable banane ke liye */
            transition: all 0.4s ease;
            width: 85%; /* Mobile par screen ke mutabiq */
            max-width: 320px; /* PC par bohot bada na ho */
            margin-top: 10px;
        }

        .btn-download:active {
            transform: scale(0.95);
            background: rgba(255, 103, 251, 0.3); /* Click par neon touch */
            opacity: 0.7;
        }

        /* Loading Animation Class */
        .loading-effect {
            pointer-events: none;
            opacity: 0.5;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div id="app">
        <canvas id="canvas"></canvas>
        <div class="hero">
            <h1>BALOCH</h1>
            <h3>Movies</h3>
            <a href="javascript:void(0)" onclick="startPage(this)" class="btn-download">
                BALOCH MOVIES DOWNLOADING WEBSITE
            </a>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        // Yahan aapka baki Three.js ka animation code (Three.js aur effects) aayega
        // Jaisa aapne pehle use kiya tha wahi chalta rahega.
    </script>

    <script>
        // Click Page Navigation Animation
        function startPage(btn) {
            btn.innerHTML = "LOADING...";
            btn.classList.add('loading-effect');
            
            // 1 second ka delay taaky animation nazar aaye
            setTimeout(() => {
                window.location.href = "home.html";
            }, 1000);
        }
    </script>
</body>
</html>
